spring.application.name=Auth-service
server.port=8086
server.error.include-message=always
spring.datasource.url=jdbc:mariadb://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
jwt.secret=MySecretKeyForJWTTokenGeneration2026MicroserviceDemo2VeryLong
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379
jwt.refresh-expiration=604800000
jwt.reset-password-expiration=900000
jwt.reset-password-url=http://localhost:3001/reset-password
